name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: JaviSerrano/buildozer-action@master # هذا المحرك يعمل حالياً بكفاءة عالية
        with:
          command: buildozer android debug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Khazna-App
          path: bin/*.apk
